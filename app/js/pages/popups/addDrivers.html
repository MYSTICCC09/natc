<div class="container-fluid" style="background: #f5f5f5; border-radius: 10px; padding:10px;">
    <br/>
    <div class="panel panel-primary">
        <div class="panel-heading"><i class="fa fa-car"></i> Add Driver</div>
        <div class="panel-body">
            <div class="row">
                <div class="col-md-12 col-lg-12 col-xs-12 col-sm-12">
                    <form ng-submit="addDriverSubmit(form)">
                        <div class="from-group">
                            <input style="margin-bottom: 10px" class="form-control txt-field" required type="text" ng-model="form.driver_fullname" placeholder="Fullname"  onfocus="this.placeholder = ''" onblur="this.placeholder = 'Fullname'">
                            <input style="margin-bottom: 10px"  class="form-control txt-field" required type="text" ng-model="form.driver_license_no" placeholder="License No." onfocus="this.placeholder = ''" onblur="this.placeholder = 'License No.'">
                            <input style="margin-bottom: 10px"  class="form-control txt-field" required type="number" ng-model="form.driver_age" placeholder="Age" onfocus="this.placeholder = ''" onblur="this.placeholder = 'Age'">
                            <input style="margin-bottom: 10px"  class="form-control txt-field" required type="text" ng-model="form.plate_no" placeholder="Plate Number" onfocus="this.placeholder = ''" onblur="this.placeholder = 'Plate Number'">
                            <input style="margin-bottom: 10px"  class="form-control txt-field" required type="date" ng-model="form.driver_bdate" placeholder="Birthdate" onfocus="this.placeholder = ''" onblur="this.placeholder = 'Birthdate'">
                        </div>
                        <div class="form-group">
                            <select ng-model="form.driver_license_type" required class="form-control" style="height: 40px">
                                <option value="" disabled selected hidden>License Type</option>
                                <option value="Professional">Professional</option>
                                <option value="Non-Pro">Non-Pro</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <button type="submit" class="btn btn-primary btn-lg btn-block text-center text-uppercase">Add</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
