<style>

    .ngdialog-content{
        top: 0px !important;  
    }

    .file {
        /*position: relative;*/
    }
    .file label {
        background: #39D2B4;
        padding: 5px;
        color: #fff;
        font-weight: bold;
        font-size: 14px;
        transition: all .4s;
        cursor: pointer;
    }
    .file input {
        position: absolute;
        display: inline-block;
        left: 0;
        top: 0;
        opacity: 0.01;
        cursor: pointer;
    }
    .file input:hover + label,
    .file input:focus + label {
        background: #34495E;
        color: #39D2B4;
    }
</style>
<div>
    <h3><i class="fa fa-1x fa-plus text-primary sr-icons"></i> Edit {{productData.product_name}}</h3>
    <br/>
    <form name="shoeForm" ng-submit="submitForm()">
        <div class="form-group">
            <!--<label for="shoeName">Shoe Stock Number</label>-->
            <input type="text" class="form-control" id="title" ng-model="productData.product_name" placeholder="Title">
        </div>
        <div class="form-group">
            <!--<label for="shoeName">Shoe Stock Number</label>-->
            <input type="text" class="form-control" id="flavorText" ng-model="productData.product_flavor_text" placeholder="Flavor Text">
        </div>
        <div class="form-group">
            <!--<label for="remarks">Remarks</label>-->
            <!--<input type="text" class="form-control" >-->
            <textarea class="form-control" id="jobDesc" placeholder="Job Description" ng-model="productData.product_desc" rows="3"></textarea>
        </div>
        <div class="form-group">
            <!--<label for="shoeName">Shoe Stock Number</label>-->
            <select ng-model="productData.category">
                <option>Communications</option>
                <option>Software Solutions</option>
                <option>Business</option>
                <option>Consumers</option>
            </select>
        </div>
        <button type="submit" class="btn btn-primary">Submit</button>
    </form>
</div>
