<div class="container-fluid" style="background: #f5f5f5; border-radius: 10px; padding:10px;">
    <br/>
    <div class="panel panel-primary">
        <div class="panel-heading"><i class="fa fa-car"></i> Add Users</div>
        <div class="panel-body">
            <div class="row">
                <div class="col-md-12 col-lg-12 col-xs-12 col-sm-12">
                    <form ng-submit="addUserSubmit(form)">
                        <div class="from-group">
                            <input style="margin-bottom: 10px" class="form-control txt-field" required type="text" ng-model="form.user_fullname" placeholder="Fullname"  onfocus="this.placeholder = ''" onblur="this.placeholder = 'Fullname'">
                            <input style="margin-bottom: 10px" class="form-control txt-field" required type="text" ng-model="form.username" placeholder="Username"  onfocus="this.placeholder = ''" onblur="this.placeholder = 'Username'">
                            <input style="margin-bottom: 10px" class="form-control txt-field" required type="password" ng-model="form.password" placeholder="Password"  onfocus="this.placeholder = ''" onblur="this.placeholder = 'Password'">
                            <input style="margin-bottom: 10px" class="form-control txt-field" required type="text" ng-model="form.contact" placeholder="Contact"  onfocus="this.placeholder = ''" onblur="this.placeholder = 'Contact'">
                            <input style="margin-bottom: 10px" class="form-control txt-field" required type="text" ng-model="form.email_address" placeholder="Email Address"  onfocus="this.placeholder = ''" onblur="this.placeholder = 'Email Address'">
                        </div>
                        <div class="form-group">
                            <select ng-model="form.user_type" required class="form-control" style="height: 40px">
                                <option value="" disabled selected hidden>User Type</option>
                                <option value="Admin">Admin</option>
                                <option value="User">User</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <select ng-model="form.terminal" required class="form-control" style="height: 40px">
                                <option value="" disabled selected hidden>Terminal</option>
                                <option value="Terminal 1">Terminal 1</option>
                                <option value="Terminal 2">Terminal 2</option>
                                <option value="Terminal 3">Terminal 3</option>
                                <option value="Terminal 4">Terminal 4</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <button type="submit" class="btn btn-primary btn-lg btn-block text-center text-uppercase">Add</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
