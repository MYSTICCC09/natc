<style>

    .ngdialog-content{
        top: 0px !important;  
    }

    .file {
        /*position: relative;*/
    }
    .file label {
        background: #39D2B4;
        padding: 5px;
        color: #fff;
        font-weight: bold;
        font-size: 14px;
        transition: all .4s;
        cursor: pointer;
    }
    .file input {
        position: absolute;
        display: inline-block;
        left: 0;
        top: 0;
        opacity: 0.01;
        cursor: pointer;
    }
    .file input:hover + label,
    .file input:focus + label {
        background: #34495E;
        color: #39D2B4;
    }
</style>
<div>
    <h3><i class="fa fa-1x fa-plus text-primary sr-icons"></i> Add Product Specification</h3>
    <br/>
    <form name="shoeForm" ng-submit="submitForm()">
        <div class="form-group">
            <!--<label for="shoeName">Shoe Stock Number</label>-->
            <input type="text" class="form-control" id="title" ng-model="specData.specs_name" placeholder="Specification Name">
        </div>
        <div class="form-group">
            <!--<label for="shoeName">Shoe Stock Number</label>-->
            <input type="text" class="form-control" id="flavorText" ng-model="specData.specs_desc" placeholder="Description">
        </div>
        <button type="submit" class="btn btn-primary">Submit</button>
    </form>
</div>
