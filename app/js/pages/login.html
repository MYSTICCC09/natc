<div class="row">
    <div class="col-lg-3"></div>
    <div class="col-md-6">
        <h1>Login - Dispatching</h1>
        <br/>
        <form ng-submit="login()">
            <div class="form-group row">
                <div class="col-sm-10">
                    <input class="form-control txt-field" required type="text" ng-model="user.username" id="username" placeholder="Username"  onfocus="this.placeholder = ''" onblur="this.placeholder = 'Username'">
                </div>
            </div>
            <div class="form-group row">
                <div class="col-sm-10">
                    <input class="form-control txt-field" required type="password" ng-model="user.password" id="password" placeholder="Password"  onfocus="this.placeholder = ''" onblur="this.placeholder = 'Password'">
                </div>
            </div>
            <div class="form-group row">
                <div class="col-sm-10">
                    <button type="submit" class="primary-btn">Submit</button>
                </div>
            </div>
        </form>
    </div>
    <div class="col-lg-3"></div>
</div>
<br/>
<br/>
